name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: go vet
        run: go vet ./internal/... ./cmd/...

      - name: go test (race)
        # Restricted to ./internal/... ./cmd/... so the lint/build
        # passes don't trip on the website/build/assets/ tree —
        # those are Docusaurus-bundled .go asset files that
        # reference internal/api symbols but are not part of the
        # go.mod build module. Same scope as the coverage gate
        # below so the percentages line up with the gate's view.
        run: go test -race -count=1 -coverprofile=coverage.txt -timeout=240s ./internal/... ./cmd/...

      - name: coverage gate (per-package floors)
        # Statement-weighted per-package coverage check. Fails the
        # build if any tracked package drops below its declared floor.
        # Floors and the rationale for each are documented in
        # scripts/coverage-gate.sh and docs/howto/maintain-coverage-gate.md.
        # PRs A-D of the v0.24.0 reliability arc ratchet these up.
        run: ./scripts/coverage-gate.sh coverage.txt

      - name: build
        run: make build

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: ignore

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: golangci-lint
        # Action v8 + linter v2.x — they share a major version, and
        # our .golangci.yml uses the v2 config schema. The previous
        # action-v6 + linter-v1.64.0 pairing 404'd because v1.64.0
        # itself was never published (v1.64 line starts at v1.64.2).
        # When bumping the linter: keep the major in sync with both
        # the action AND the schema version in .golangci.yml. The
        # action caches the lint binary so re-runs on the same SHA
        # are fast.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

  compose-lint:
    name: compose config (image-mode + source-build) (#134)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Compose `config` resolves variables and emits the merged YAML;
      # it exits non-zero on a broken file. Cheap parity check that
      # both install paths interpolate cleanly — does NOT spin up the
      # stack (that needs published images at the current SHA's tag).
      - name: write minimal .env for config
        run: |
          mkdir -p deploy/compose
          touch deploy/compose/.env.local
      - name: image-mode (base only)
        env:
          HELMDECK_JWT_SECRET: ci-only-not-a-real-secret
          HELMDECK_VERSION: latest
        run: |
          docker compose \
            -f deploy/compose/compose.yaml \
            --env-file deploy/compose/.env.local \
            config --quiet
      - name: source-build (base + overlay)
        env:
          HELMDECK_JWT_SECRET: ci-only-not-a-real-secret
          HELMDECK_VERSION: dev
        run: |
          docker compose \
            -f deploy/compose/compose.yaml \
            -f deploy/compose/compose.build.yaml \
            --env-file deploy/compose/.env.local \
            config --quiet
      - name: install.sh --help (flag-parsing smoke)
        run: bash scripts/install.sh --help >/dev/null

  goreleaser-check:
    name: goreleaser config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          install-only: true
      - run: goreleaser check

  trivy-scan:
    name: trivy fs scan (T511)
    # Filesystem scan for vulnerable Go modules and known-bad
    # configuration. Fails the build on any CRITICAL finding so a
    # high-severity CVE in a transitive dep blocks the merge before
    # it lands on main. HIGH/MEDIUM/LOW are reported but non-fatal —
    # surface them in the SARIF upload so operators can review them
    # in the GitHub Security tab without blocking PRs.
    #
    # Operators triaging a failed scan: see docs/SECURITY-HARDENING.md
    # for the runbook.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan (CRITICAL gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          # Only scan for vulnerabilities + misconfigurations here.
          # Secrets are gitleaks' job in a separate workflow — trivy's
          # secret scanner false-positives on UI placeholder strings
          # (e.g. `ghp_xxxx...` in web/src/pages/vault.tsx) and shell
          # heredocs in the sidecar entrypoint. Duplicating secret
          # detection across two tools just produces noise.
          scanners: vuln,misconfig
          skip-files: 'deploy/docker/sidecar-entrypoint.sh'

      - name: Run Trivy filesystem scan (full SARIF report)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          scanners: vuln,misconfig
          skip-files: 'deploy/docker/sidecar-entrypoint.sh'

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

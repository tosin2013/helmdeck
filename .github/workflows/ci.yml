name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 -coverprofile=coverage.txt ./...

      - name: build
        run: make build

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: ignore

  goreleaser-check:
    name: goreleaser config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          install-only: true
      - run: goreleaser check

  trivy-scan:
    name: trivy fs scan (T511)
    # Filesystem scan for vulnerable Go modules and known-bad
    # configuration. Fails the build on any CRITICAL finding so a
    # high-severity CVE in a transitive dep blocks the merge before
    # it lands on main. HIGH/MEDIUM/LOW are reported but non-fatal —
    # surface them in the SARIF upload so operators can review them
    # in the GitHub Security tab without blocking PRs.
    #
    # Operators triaging a failed scan: see docs/SECURITY-HARDENING.md
    # for the runbook.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (CRITICAL gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
          # Only scan for vulnerabilities + misconfigurations here.
          # Secrets are gitleaks' job in a separate workflow — trivy's
          # secret scanner false-positives on UI placeholder strings
          # (e.g. `ghp_xxxx...` in web/src/pages/vault.tsx) and shell
          # heredocs in the sidecar entrypoint. Duplicating secret
          # detection across two tools just produces noise.
          scanners: vuln,misconfig
          skip-files: 'deploy/docker/sidecar-entrypoint.sh'

      - name: Run Trivy filesystem scan (full SARIF report)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: 'CRITICAL,HIGH,MEDIUM'
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          scanners: vuln,misconfig
          skip-files: 'deploy/docker/sidecar-entrypoint.sh'

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

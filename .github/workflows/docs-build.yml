name: docs-build

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'website/**'
      - '*.md'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - '*.md'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

name: Integration (Docker)

# Runs the //go:build integration tests — the ones that spin REAL session
# sidecars over the Docker socket (persistent repos volume, cross-session
# reuse, slides auto-fit, CDP screenshot, S3 artifact store). The default
# `go test ./...` in ci.yml skips these (no integration tag / self-gated on
# Docker), which is how a fresh-stack-only bug like the /repos permission
# failure (#298) shipped green. These need Docker but NO paid APIs, so they
# belong in CI.
#
# Path-scoped on PRs (only when pack/pipeline/session/runtime/cdp or a sidecar
# image changes) so the slower Docker job doesn't gate every PR, plus a
# nightly run and manual dispatch.
#
# No-silent-skips policy (issue #303): this job provisions EVERY dependency
# its integration tests need — Docker, HELMDECK_INTEGRATION=1, HELMDECK_E2E=1,
# the built sidecars, universal-ctags, and a MinIO S3 endpoint. So nothing
# should skip, and the final step FAILS the job on any `--- SKIP`. A skip
# asserts nothing; that's exactly how TestSlidesFit_NoSectionOverflow silently
# never ran (see the the-test-that-never-ran blog post). If a new test needs a
# dep we don't have here, provision it below rather than letting it skip into
# a green run.

on:
  pull_request:
    paths:
      - 'internal/packs/**'
      - 'internal/pipelines/**'
      - 'internal/session/**'
      - 'internal/repos/**'
      - 'internal/cdp/**'
      - 'deploy/docker/sidecar.Dockerfile'
      - 'deploy/docker/sidecar-hyperframes.Dockerfile'
      - '.github/workflows/integration.yml'
  schedule:
    - cron: '0 5 * * *'   # nightly at 05:00 UTC
  workflow_dispatch:

jobs:
  integration:
    name: Docker integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      # universal-ctags backs the repo.map integration tests (TestRepoMap_*
      # and TestCtagsSanity). Ubuntu's default `ctags` is a different tool;
      # without the universal build those tests skip. macos-ci installs the
      # brew equivalent for the same reason.
      - name: Install universal-ctags
        run: sudo apt-get update && sudo apt-get install -y universal-ctags

      # Build the sidecar locally and tag it as the runtime's default image
      # so dockerrt.New() finds it WITHOUT pulling from ghcr — this exercises
      # the PR's actual sidecar (incl. any Dockerfile change) and avoids
      # depending on registry availability/staleness. Also backs the CDP
      # screenshot e2e (TestRealChromiumNavigateScreenshot).
      - name: Build sidecar image
        run: make sidecar-build

      - name: Tag sidecar as runtime default
        run: docker tag helmdeck-sidecar:dev ghcr.io/tosin2013/helmdeck-sidecar:latest

      # The hyperframes sidecar (built incrementally on the base) backs the
      # CLI-surface invariant for the `hyperframes` binary. Without it that
      # subtest skips — i.e. never checks that the pack's declared argv flags
      # still match the real CLI.
      - name: Build hyperframes sidecar image
        run: make sidecar-hyperframes-build

      # MinIO backs the S3 artifact-store live test (TestS3ArtifactStoreLive in
      # internal/packs). Run it as a container (GitHub `services:` can't
      # override the image CMD, and minio/minio needs `server /data`).
      - name: Start MinIO (S3 artifact store)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data

      - name: Wait for MinIO and create bucket
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "MinIO ready after ${i}s"; break
            fi
            sleep 1
          done
          docker run --rm --network host --entrypoint sh minio/mc -c \
            'mc alias set local http://localhost:9000 minioadmin minioadmin && mc mb --ignore-existing local/helmdeck-test'

      - name: Run integration tests
        env:
          HELMDECK_INTEGRATION: "1"
          # CDP screenshot e2e is gated off in CI unless this is set.
          HELMDECK_E2E: "1"
          HELMDECK_S3_TEST_ENDPOINT: "localhost:9000"
          HELMDECK_S3_TEST_BUCKET: "helmdeck-test"
          HELMDECK_S3_TEST_KEY: "minioadmin"
          HELMDECK_S3_TEST_SECRET: "minioadmin"
        # -count=1 disables the test cache so the verbose per-test output the
        # skip gate parses is real (a cached package prints only "ok (cached)").
        run: |
          set -o pipefail
          go test -tags=integration -count=1 -timeout 25m -v \
            ./internal/packs/... ./internal/session/docker/... ./internal/cdp/... 2>&1 | tee integration-test.log

      # No-silent-skips gate: a SKIP in this fully-provisioned environment
      # means a test asserted nothing. Surface every skip and fail, so the
      # class of bug from issue #303 can't recur unnoticed.
      - name: Fail on silent skips
        if: always()
        run: |
          if [ ! -f integration-test.log ]; then
            echo "::error::integration-test.log missing — the test step did not run"
            exit 1
          fi
          skipped=$(grep -E -- '--- SKIP:' integration-test.log || true)
          if [ -n "$skipped" ]; then
            echo "::error::Integration suite skipped test(s). This job provisions every dependency its tests need (Docker + HELMDECK_INTEGRATION + HELMDECK_E2E + built sidecars + ctags + MinIO), so nothing should skip — a skip asserts nothing. Provision the missing dependency in integration.yml, or remove the dead test."
            echo "$skipped"
            {
              echo "### ❌ Silent skips in the integration suite"
              echo "A skipped integration test asserts nothing. Provision its dependency or delete it."
              echo ""
              echo '```'
              echo "$skipped"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ No skipped tests — every integration test asserted something."

name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for npm dry-runs and pre-release verification.
  # Use this before cutting a real tag to confirm NPM_TOKEN is wired,
  # the @helmdeck org grants publish, and the postinstall payloads
  # exist on the corresponding GitHub release.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0-rc.1). Used for the npm-bridge job only.'
        required: true
        type: string
      npm_dry_run:
        description: 'If true, run npm publish --dry-run instead of actually publishing.'
        required: false
        default: true
        type: boolean
      npm_dist_tag:
        description: 'npm dist-tag to publish under (use "next" for pre-releases so latest is unaffected).'
        required: false
        default: 'next'
        type: string

permissions:
  contents: write   # GitHub Releases
  packages: write   # ghcr.io
  id-token: write   # cosign keyless OIDC

jobs:
  control-plane-image:
    name: Publish control-plane image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the Management UI bundle FIRST so the embedded
      # web/dist/ in the image matches the asset hashes referenced
      # from web/dist/index.html. web/dist/assets/ is gitignored;
      # without this step the image ships with whatever stale
      # index.html was last committed, breaking the UI on fresh
      # pulls (#180).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build web bundle
        run: |
          cd web
          npm ci
          npm run build
      - name: Verify embedded web hashes resolve
        run: |
          set -euo pipefail
          cd web/dist
          missing=0
          for asset in $(grep -oE 'assets/(index|[A-Za-z0-9_-]+)-[A-Za-z0-9_-]+\.(js|css)' index.html); do
            if [ ! -f "$asset" ]; then
              echo "MISSING: $asset (referenced from index.html but not in web/dist/)"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "::error::web build produced index.html referencing assets not on disk; aborting release"
            exit 1
          fi
          echo "All embedded asset hashes resolve."

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tosin2013/helmdeck
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: sigstore/cosign-installer@v3

      - name: Build and push control-plane
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/control-plane.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          provenance: true
          sbom: true

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | xargs -I {} cosign sign --yes {}@$DIGEST

  goreleaser:
    name: Release binaries + bridge image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Tag-push path: publish @helmdeck/mcp-bridge to `latest` after the
  # goreleaser job has uploaded the binary tarballs the postinstall
  # script will fetch. Authenticates via npm Trusted Publishing (OIDC).
  # Trust is configured on npmjs.com against this exact workflow file
  # (release.yml). Two non-obvious requirements:
  #
  #   1. Trusted publishing requires npm ≥ 11.5.1. Node 20 LTS ships
  #      with npm 10.x, which doesn't speak the OIDC protocol — failed
  #      auth surfaces as a misleading 404 at PUT time. We `npm install
  #      -g npm@latest` before publishing to pull in a current CLI.
  #   2. The `--provenance` flag is what triggers npm's OIDC handshake
  #      with the GitHub token endpoint. Without it the publish goes
  #      out unauthenticated and npm returns the same 404. Provenance
  #      is NOT automatic under trusted publishing despite some docs
  #      implying otherwise — it must be requested explicitly.
  npm-bridge-release:
    name: Publish @helmdeck/mcp-bridge (release)
    if: github.event_name == 'push'
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm to ≥ 11.5.1 for trusted publishing
        run: npm install -g npm@latest
      - name: Pin package version to release tag
        working-directory: npm
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION.replace(/^v/,'');fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
      - name: Publish to npm via trusted publishing
        working-directory: npm
        run: npm publish --provenance --access public

  # Manual-dispatch path: dry-run by default to validate the token,
  # org permission, and package contents without shipping. Set
  # npm_dry_run=false to publish a pre-release under the chosen
  # dist-tag (defaults to `next` so `latest` is unaffected). This job
  # is decoupled from goreleaser — the dry-run doesn't need release
  # artifacts, and pre-release npm publishes are validated independently.
  npm-bridge-manual:
    name: Publish @helmdeck/mcp-bridge (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm to ≥ 11.5.1 for trusted publishing
        run: npm install -g npm@latest
      - name: Pin package version
        working-directory: npm
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
      - name: Publish to npm via trusted publishing
        working-directory: npm
        run: |
          if [[ "${{ inputs.npm_dry_run }}" == "true" ]]; then
            npm publish --dry-run --access public
          else
            npm publish --provenance --access public --tag "${{ inputs.npm_dist_tag }}"
          fi

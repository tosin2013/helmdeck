name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for npm dry-runs and pre-release verification.
  # Use this before cutting a real tag to confirm NPM_TOKEN is wired,
  # the @helmdeck org grants publish, and the postinstall payloads
  # exist on the corresponding GitHub release.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0-rc.1). Used for the npm-bridge job only.'
        required: true
        type: string
      npm_dry_run:
        description: 'If true, run npm publish --dry-run instead of actually publishing.'
        required: false
        default: true
        type: boolean
      npm_dist_tag:
        description: 'npm dist-tag to publish under (use "next" for pre-releases so latest is unaffected).'
        required: false
        default: 'next'
        type: string

permissions:
  contents: write   # GitHub Releases
  packages: write   # ghcr.io
  id-token: write   # cosign keyless OIDC

jobs:
  control-plane-image:
    name: Publish control-plane image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tosin2013/helmdeck
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: sigstore/cosign-installer@v3

      - name: Build and push control-plane
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/control-plane.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          provenance: true
          sbom: true

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | xargs -I {} cosign sign --yes {}@$DIGEST

  goreleaser:
    name: Release binaries + bridge image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-bridge:
    name: Publish @helmdeck/mcp-bridge
    # On tag push, wait for goreleaser so the release artifacts the
    # postinstall script downloads exist before users can `npm install`.
    # On manual dispatch, run independently — the dry-run path doesn't
    # need real artifacts, and a real pre-release publish under the
    # `next` dist-tag is decoupled from the binary release flow.
    needs: ${{ github.event_name == 'push' && fromJSON('["goreleaser"]') || fromJSON('[]') }}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve target version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pin package version
        working-directory: npm
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Tag-push: real publish to `latest`, with provenance, after goreleaser.
          # workflow_dispatch + npm_dry_run=true: --dry-run, no token side effects.
          # workflow_dispatch + npm_dry_run=false: real publish under the chosen dist-tag.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            npm publish --provenance --access public
          elif [[ "${{ inputs.npm_dry_run }}" == "true" ]]; then
            npm publish --dry-run --access public
          else
            npm publish --provenance --access public --tag "${{ inputs.npm_dist_tag }}"
          fi

name: Sidecar Image

on:
  push:
    branches: [main]
    paths:
      - 'deploy/docker/sidecar.Dockerfile'
      - 'deploy/docker/sidecar-entrypoint.sh'
      - '.github/workflows/sidecar.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/docker/sidecar.Dockerfile'
      - 'deploy/docker/sidecar-entrypoint.sh'
      - '.github/workflows/sidecar.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: sidecar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tosin2013/helmdeck-sidecar
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/sidecar.Dockerfile
          # arm64 deferred: Marp CLI ships an amd64-only Linux release tarball
          # (marp-cli-v4.0.4-linux.tar.gz is x86_64) and the COPY-from-build
          # stage stamps that binary onto every target arch, so the arm64 leg
          # fails with "exec format error" at the chmod/--version sanity check.
          # v0.2 will switch to npm-based Marp install which is multi-arch
          # native; until then we publish amd64 only.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,scope=sidecar,mode=max
          provenance: true
          sbom: true

      - name: Sign image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | xargs -I {} cosign sign --yes {}@$DIGEST

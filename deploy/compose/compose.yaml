# Helmdeck — single-node Compose deployment (ADR 009 dev / staging tier).
#
# This stack brings up the control plane backed by SQLite (Postgres lands
# alongside the K8s StatefulSet in T703). The control plane spawns
# ephemeral browser-sidecar containers via the host Docker socket and
# attaches each one to the baas-net bridge so CDP traffic stays off the
# host. Operators reach the API on http://localhost:3000.
#
# Bring up:    docker compose -f deploy/compose/compose.yaml --env-file deploy/compose/.env up -d
# Tear down:   docker compose -f deploy/compose/compose.yaml down -v
# Mint a token:
#   docker compose -f deploy/compose/compose.yaml exec control-plane \
#     /usr/local/bin/control-plane -mint-token=admin -mint-token-scopes=admin
#
# The named volume helmdeck-data persists the SQLite database (audit log,
# config) across restarts. baas-net is a private bridge — the control
# plane is the only thing on it that the host can reach (port 3000).

services:
  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker/control-plane.Dockerfile
    image: ghcr.io/tosin2013/helmdeck:dev
    container_name: helmdeck-control-plane
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    # Forward every secret from the install-script-generated .env.local
    # into the container. The environment: block below names the static,
    # non-secret bits; env_file pulls in HELMDECK_VAULT_KEY,
    # HELMDECK_KEYSTORE_KEY, HELMDECK_ADMIN_PASSWORD, etc. so the control
    # plane can decrypt the vault, decrypt the AI provider keystore, and
    # serve the Management UI login endpoint.
    env_file:
      - .env.local
    environment:
      HELMDECK_ADDR: ":3000"
      HELMDECK_DB: "/data/helmdeck.db"
      HELMDECK_SESSION_NETWORK: "baas-net"
      HELMDECK_JWT_SECRET: "${HELMDECK_JWT_SECRET:?HELMDECK_JWT_SECRET is required; copy .env.example to .env and fill it in}"
      # Object store wiring (ADR 031, T211a). Endpoint, bucket, and the
      # access/secret are populated by the garage-init service into a
      # shared volume; the *_FILE env vars tell the control plane to
      # read them from disk at startup. Operators who want to point at
      # an external S3 instead can override the *_FILE vars with the
      # plain HELMDECK_S3_* equivalents — env vars take precedence.
      HELMDECK_S3_ENDPOINT_FILE:    "/garage-credentials/endpoint"
      HELMDECK_S3_BUCKET_FILE:      "/garage-credentials/bucket"
      HELMDECK_S3_ACCESS_KEY_FILE:  "/garage-credentials/access_key"
      HELMDECK_S3_SECRET_KEY_FILE:  "/garage-credentials/secret_key"
      HELMDECK_S3_REGION:           "garage"
    volumes:
      - helmdeck-data:/data
      - garage-credentials:/garage-credentials:ro
      # Required so the control plane can spawn ephemeral session
      # containers via the SessionRuntime / Docker SDK backend.
      # Read-write because ContainerCreate, Start, Logs, Remove all
      # need write access to the daemon API.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - baas-net
    depends_on:
      garage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/control-plane", "-version"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    # Add the host's docker group as a supplementary group so the
    # nonroot user (UID 65532) inside the distroless image can read
    # /var/run/docker.sock. The default docker socket is mode 660 owned
    # by root:docker, so the container user needs to join that group.
    # Set HELMDECK_DOCKER_GID in your .env to match `getent group docker
    # | cut -d: -f3` on your host (typically 999 on Debian/Ubuntu).
    group_add:
      - "${HELMDECK_DOCKER_GID:-999}"

  # Pre-pull the sidecar image at stack startup so the first session
  # creation isn't a 30-second cold pull. One-shot service.
  sidecar-warm:
    image: docker:cli
    container_name: helmdeck-sidecar-warm
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["docker pull ghcr.io/tosin2013/helmdeck-sidecar:latest || true"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - control-plane

  # Garage object store (ADR 031, T211a) — bundled default for the
  # Compose tier. Single-node, replication_factor=1. Operators who
  # want to point helmdeck at an external S3 (AWS, R2, B2, SeaweedFS,
  # MinIO-fork) can stop this service and override the control-plane
  # HELMDECK_S3_* env vars in their .env file.
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: helmdeck-garage
    restart: unless-stopped
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    networks:
      - baas-net
    healthcheck:
      # garage status returns 0 once the daemon is answering, even
      # before a layout is applied. The init service handles the
      # post-boot bootstrap.
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # One-shot bootstrap: layout assign + apply, bucket + key creation,
  # and credential export to a shared volume. Idempotent — every run
  # refreshes the credential files but is otherwise a no-op once the
  # cluster is bootstrapped. Compose gates control-plane startup on
  # this completing successfully.
  garage-init:
    build:
      context: ../..
      dockerfile: deploy/docker/garage-init.Dockerfile
    image: helmdeck-garage-init:dev
    container_name: helmdeck-garage-init
    restart: "no"
    entrypoint: ["/bin/sh", "/garage-init.sh"]
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./garage-init.sh:/garage-init.sh:ro
      - garage-credentials:/credentials
      # Share garage's metadata volume so the CLI inside this container
      # can read the node key file the daemon writes on first launch.
      # Without this, `garage status` from a separate container errors
      # with "Unable to read node key" — the CLI tries to act as a
      # cluster member and needs the node identity to authenticate
      # against the running daemon over RPC.
      - garage-meta:/var/lib/garage/meta
    networks:
      - baas-net
    depends_on:
      garage:
        condition: service_healthy

volumes:
  helmdeck-data:
    name: helmdeck-data
  garage-meta:
    name: helmdeck-garage-meta
  garage-data:
    name: helmdeck-garage-data
  garage-credentials:
    name: helmdeck-garage-credentials

networks:
  baas-net:
    name: baas-net
    driver: bridge
    internal: false   # set true once the AI gateway has the egress allowlist (T508)

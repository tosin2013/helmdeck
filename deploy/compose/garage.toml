# Garage v2 configuration for the helmdeck Compose stack (ADR 031, T211a).
#
# Single-node, replication_factor=1 — appropriate for the dev/staging
# tier that Compose targets. The Helm chart (T211a follow-on, Phase 7)
# will template a multi-node version with replication_factor=3.
#
# Production operators should override the rpc_secret and admin_token
# below by mounting their own garage.toml — the values here are stable
# dev defaults so `docker compose up` produces a working stack with no
# extra setup, but they are NOT secrets and MUST NOT be reused outside
# a developer machine.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

replication_factor = 1

# Stable dev RPC secret. Override in production by mounting a custom
# garage.toml. Format: 32 hex bytes = 64 hex chars.
rpc_secret = "6c2c8b8e27e9f2a3a3b1d5e9f8c4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2"
rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"

[s3_api]
api_bind_addr = "[::]:3900"
s3_region = "garage"
root_domain = ".s3.garage.local"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.local"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b"
metrics_token = "b1a2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f90"
